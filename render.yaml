services:
  - type: web
    name: sabiha-hospital
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 180
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: hospital_management
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: LEGACY_ENCRYPTION_KEYS
        sync: false
      - key: DEFAULT_ADMIN_USERNAME
        value: sabihaadmin
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_ADMIN_NAME
        value: Sabiha Admin
      - key: PASSWORD_RESET_EXPIRY_MINUTES
        value: 30
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: WHATSAPP_PROVIDER
        value: simulation
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: REDIS_URL
        fromService:
          type: redis
          name: sabiha-hospital-redis
          property: connectionString

  - type: redis
    name: sabiha-hospital-redis
    plan: free
    ipAllowList: []
